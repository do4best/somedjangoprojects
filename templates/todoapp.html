<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8 col-md-10">
        <div class="card shadow border-0 rounded-4">
          <div class="card-body p-4 p-md-5">
            <h2 class="text-center fw-bold mb-4">My Todo List</h2>

            <form method="POST" class="mb-4">
              {% csrf_token %}
              <div class="input-group input-group-lg">
                <input type="text" class="form-control" name="todo" placeholder="Add a new task..." required>
                <button class="btn btn-primary" type="submit">Add Todo</button>
              </div>
            </form>

            <div class="list-group">
              {% for task in todos %}
                <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                  <span class="{% if task.completed %}text-decoration-line-through text-muted{% endif %}">
                    {{ task.title }}
                  </span>
                  <div class="btn-group">
                    {% if not task.completed %}
                      <a href="{% url 'complete_todo' task.id %}" class="btn btn-sm btn-success">Done</a>
                    {% endif %}
                    <a href="{% url 'delete_todo' task.id %}" class="btn btn-sm btn-danger">Delete</a>
                  </div>
                </div>
              {% empty %}
                <div class="text-center text-muted py-4">
                  No todos yet. Add your first task above.
                </div>
              {% endfor %}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
